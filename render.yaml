# ============================================
# Render Blueprint - Infrastructure as Code
# Deploy with: render.com → New → Blueprint
# ============================================

services:
  - type: web
    name: resource-allocation-system
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false  # Set this in Render dashboard → Environment
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        value: sqlite:///resource_booking.db
