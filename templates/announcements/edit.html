{% extends "base.html" %}

{% block title %}Edit Announcement - Admin{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <h1 class="mb-4"><i class="bi bi-megaphone-fill"></i> Edit Announcement</h1>
            
            <div class="card shadow">
                <div class="card-body p-4">
                    <form method="POST">
                        <div class="mb-4">
                            <label for="title" class="form-label fw-bold">Announcement Title *</label>
                            <input type="text" class="form-control form-control-lg" id="title" name="title" 
                                   value="{{ announcement.title }}" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="message" class="form-label fw-bold">Message Content *</label>
                            <textarea class="form-control" id="message" name="message" rows="5" required>{{ announcement.message }}</textarea>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-4">
                                <label for="type" class="form-label fw-bold">Announcement Type</label>
                                <select class="form-select" id="type" name="type">
                                    <option value="info" {% if announcement.announcement_type == 'info' %}selected{% endif %}>Information</option>
                                    <option value="warning" {% if announcement.announcement_type == 'warning' %}selected{% endif %}>Warning</option>
                                    <option value="maintenance" {% if announcement.announcement_type == 'maintenance' %}selected{% endif %}>Maintenance</option>
                                    <option value="alert" {% if announcement.announcement_type == 'alert' %}selected{% endif %}>Alert</option>
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-4">
                                <label for="expire_days" class="form-label fw-bold">Expires In (days)</label>
                                <input type="number" class="form-control" id="expire_days" name="expire_days" 
                                       min="0" max="365" value="7">
                                <small class="text-muted">0 = Never expires</small>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="is_pinned" name="is_pinned"
                                       {% if announcement.is_pinned %}checked{% endif %}>
                                <label class="form-check-label" for="is_pinned">
                                    <strong>Pin to Top</strong>
                                </label>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="is_active" name="is_active"
                                       {% if announcement.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="is_active">
                                    <strong>Active</strong> - Show this announcement to users
                                </label>
                            </div>
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-lg px-5">
                                <i class="bi bi-check-circle"></i> Update Announcement
                            </button>
                            <a href="{{ url_for('announcements.manage_announcements') }}" class="btn btn-outline-secondary btn-lg">
                                <i class="bi bi-x-circle"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
