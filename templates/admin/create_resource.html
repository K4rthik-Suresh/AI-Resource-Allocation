{% extends "base.html" %}

{% block title %}Create Resource - Admin{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <h1>Create New Resource</h1>
            <form method="POST" class="mt-4">
                <!-- Added CSRF token for security -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="form-group mb-3">
                    <label for="name">Resource Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                
                <div class="form-group mb-3">
                    <label for="description">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                </div>
                
                <div class="form-group mb-3">
                    <label for="resource_type">Resource Type</label>
                    <input type="text" class="form-control" id="resource_type" name="resource_type" placeholder="e.g., room, hall, lab, equipment" required>
                </div>
                
                <div class="form-group mb-3">
                    <label for="capacity">Capacity</label>
                    <input type="number" class="form-control" id="capacity" name="capacity" min="1" required>
                </div>
                
                <div class="row">
                    <div class="col-md-12">
                        <div class="form-group mb-3">
                            <label for="hourly_rate">Hourly Rate ($)</label>
                            <input type="number" class="form-control" id="hourly_rate" name="hourly_rate" step="0.01" min="0" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-group mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="available" name="available" checked>
                        <label class="form-check-label" for="available">Available for Booking</label>
                    </div>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Create Resource</button>
                    <a href="{{ url_for('admin.manage_resources') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
